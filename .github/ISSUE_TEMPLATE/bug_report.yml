name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: When I do X, Y happens instead of Z
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue
      placeholder: |
        1. Start the API with `poetry run uvicorn orchestra.main:app`
        2. Send a POST to `/api/v1/orchestrator` with payload...
        3. Observe error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages, stack traces, or logs.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system is affected?
      options:
        - API / Routes
        - Agent / Orchestrator
        - Platform Connector
        - Bidding Engine
        - Compliance / Risk
        - RAG / Vector Store
        - CLI
        - Docker / Infrastructure
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: OrchestraAI Version
      description: Output of `poetry run orchestra version`
      placeholder: "0.1.0"

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "3.12.0"

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Docker

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Anything else that might help (config snippets, screenshots, etc.)
